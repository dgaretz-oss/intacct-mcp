<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Intacct OAuth Callback</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 600px; margin: 60px auto; padding: 0 20px; }
    h2 { margin-bottom: 8px; }
    p  { color: #555; margin-top: 0; }
    #code-box {
      font-family: monospace;
      font-size: 1.1em;
      background: #f4f4f4;
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 14px 16px;
      word-break: break-all;
      margin: 16px 0;
    }
    button {
      padding: 8px 16px;
      font-size: 0.95em;
      cursor: pointer;
      border: 1px solid #aaa;
      border-radius: 5px;
      background: #fff;
    }
    button:hover { background: #eee; }
    .error { color: #c00; }
  </style>
</head>
<body>
  <h2>Authorization Code</h2>
  <p>Copy this code and paste it into your terminal:</p>
  <div id="code-box"></div>
  <button onclick="copyCode()">Copy to clipboard</button>
  <p id="status" style="margin-top:10px;color:#555;"></p>

  <script>
    const params = new URLSearchParams(window.location.search);
    const code  = params.get('code');
    const error = params.get('error');
    const box   = document.getElementById('code-box');

    if (code) {
      box.textContent = code;
    } else if (error) {
      box.innerHTML = '<span class="error">Error: ' + error +
        (params.get('error_description') ? ' — ' + params.get('error_description') : '') + '</span>';
    } else {
      box.innerHTML = '<span class="error">No code found in URL.</span>';
    }

    function copyCode() {
      if (!code) return;
      navigator.clipboard.writeText(code).then(() => {
        document.getElementById('status').textContent = 'Copied!';
        setTimeout(() => document.getElementById('status').textContent = '', 2000);
      });
    }
  </script>
</body>
</html>
